name: feature_profile
description: >-
  Account view — migrated from the old app's real, read-only account_page
  (avatar/name/nik + logout, no repository/datasource of its own; reads
  authentication's AuthCubit.state.sessionProfile). Not the synthetic
  name/email/bio/phoneNumber edit form this package started as — see
  MIGRATION_LOG.md's `dashboard` row.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  authentication:
    path: ../authentication
  design_system:
    path: ../design_system
  shared:
    path: ../shared
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  go_router: ^17.3.0
  injectable: ^3.0.0

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^3.0.0
  mocktail: ^1.0.4

flutter:
