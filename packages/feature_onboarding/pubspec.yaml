name: feature_onboarding
description: >-
  First-launch intro carousel — second migrated feature (MIGRATION_LOG.md).
  Local-only (shared_preferences), no network: proves the local-storage
  repository layer and the "no UseCase" pass-through case a second time,
  deliberately deferring the write-path + UseCase (§21/ADR-004) test to
  whichever feature #3 turns out to be.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  core:
    path: ../core
  design_system:
    path: ../design_system
  shared:
    path: ../shared
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  injectable: ^3.0.0
  shared_preferences: ^2.3.2
  go_router: ^17.3.0

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  injectable_generator: ^3.0.0
  mocktail: ^1.0.4

flutter:
