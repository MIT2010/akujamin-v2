name: feature_test
description: >-
  Psychological test-taking flow — migrated from the old app's `test`
  feature. Covers the camera/proctoring prerequisite (the ML Kit
  face-detection wrapper, the live face-match endpoint — the only one of
  the two duplicate implementations found that's actually called anywhere,
  see the write-path audit — and the proctoring state machine) plus the
  full question/answer/timer/screenshot-block flow (MIGRATION_LOG.md's
  Langkah 3-4 flow map, docs/qa/test.md). Deliberately self-contained, not
  shared — no second real consumer exists for any of this (§1 "extract
  once"), same reasoning as `feature_counseling`'s websocket layer.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  core:
    path: ../core
  shared:
    path: ../shared
  camera: ^0.12.0+1
  dio: ^5.7.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  google_mlkit_face_detection: ^0.14.0
  image: ^4.8.0
  injectable: ^3.0.0
  json_annotation: ^4.12.0
  just_audio: ^0.10.5
  no_screenshot: ^1.1.0
  video_player: ^2.11.1

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  injectable_generator: ^3.0.0
  json_serializable: ^6.14.0
  mocktail: ^1.0.4

flutter:
